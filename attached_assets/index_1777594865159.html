<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BoxStat — Tournaments</title>
<link rel="stylesheet" href="shared.css" />
<style>
  /* HUB */
  .hub{display:flex;flex-direction:column;gap:24px;}
  .hub__hero{display:grid;grid-template-columns:1.4fr 1fr;gap:0;border-radius:24px;overflow:hidden;border:1px solid rgba(226,18,36,0.4);background:linear-gradient(135deg,rgba(226,18,36,0.18),rgba(226,18,36,0.04) 50%,rgba(0,0,0,0.6));position:relative;min-height:280px;}
  .hub__hero::before{content:"";position:absolute;right:-150px;top:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(226,18,36,0.45),transparent 60%);filter:blur(40px);pointer-events:none;}
  .hub__hero-l{padding:32px;display:flex;flex-direction:column;gap:14px;justify-content:space-between;position:relative;z-index:1;}
  .hub__hero-r{padding:32px;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);display:flex;flex-direction:column;gap:14px;border-left:1px solid rgba(255,255,255,0.06);position:relative;z-index:1;}
  .hub__filters{display:flex;gap:8px;flex-wrap:wrap;}
  .hub__filter{padding:8px 14px;border-radius:999px;font-weight:700;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.02);cursor:pointer;}
  .hub__filter.active{background:rgba(226,18,36,0.15);color:var(--bx-red);border-color:rgba(226,18,36,0.4);}
  .hub__grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
  .t-card{background:linear-gradient(145deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:20px;cursor:pointer;transition:all .35s cubic-bezier(0.16,1,0.3,1);position:relative;overflow:hidden;}
  .t-card:hover{transform:translateY(-3px);border-color:rgba(226,18,36,0.4);}
  .t-card__head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px;}
  .t-card__sport{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:20px;}
  .t-card__title{font-family:var(--bx-font-display);font-size:20px;letter-spacing:-0.02em;color:#fff;margin:0 0 4px;line-height:1.15;}
  .t-card__sub{font-family:var(--bx-font-mono);font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.06em;}
  .t-card__meta{display:flex;gap:18px;margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06);}
  .t-card__stat{display:flex;flex-direction:column;gap:2px;}
  .t-card__stat-num{font-family:var(--bx-font-display);font-size:18px;letter-spacing:-0.02em;color:#fff;}
  .t-card__stat-lbl{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.4);}
  .t-card--new{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border-style:dashed;border-color:rgba(226,18,36,0.4);background:radial-gradient(circle at center,rgba(226,18,36,0.08),transparent 70%);min-height:228px;}
  .t-card--new svg{width:36px;height:36px;color:var(--bx-red);margin-bottom:12px;}

  /* WIZARD */
  .wiz{display:grid;grid-template-columns:280px 1fr 360px;height:100%;background:#000;}
  .wiz__steps{padding:32px 24px;border-right:1px solid rgba(255,255,255,0.06);}
  .wiz__step{display:flex;align-items:center;gap:14px;padding:14px 12px;border-radius:10px;color:rgba(255,255,255,0.5);font-weight:600;font-size:13px;cursor:pointer;transition:all .3s;}
  .wiz__step.active{background:rgba(226,18,36,0.1);color:#fff;}
  .wiz__step.done{color:rgba(255,255,255,0.7);}
  .wiz__step-num{width:30px;height:30px;border-radius:999px;border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-family:var(--bx-font-mono);font-size:12px;font-weight:700;flex-shrink:0;}
  .wiz__step.active .wiz__step-num{background:var(--bx-red);border-color:var(--bx-red);color:#fff;}
  .wiz__step.done .wiz__step-num{background:rgba(34,197,94,0.18);border-color:rgba(34,197,94,0.4);color:#22c55e;}
  .wiz__step-num svg{width:14px;height:14px;}
  .wiz__step-sub{font-size:11px;color:rgba(255,255,255,0.4);font-weight:500;margin-top:2px;}
  .wiz__main{padding:48px 56px;overflow-y:auto;display:flex;flex-direction:column;gap:24px;position:relative;z-index:1;}
  .wiz__panel{display:none;flex-direction:column;gap:24px;}
  .wiz__panel.active{display:flex;animation:tfade .4s cubic-bezier(0.16,1,0.3,1) forwards;}
  @keyframes tfade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .wiz__nav{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-top:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);position:sticky;bottom:0;}

  .ai{padding:24px;border-left:1px solid rgba(226,18,36,0.2);background:linear-gradient(180deg,rgba(226,18,36,0.05),rgba(0,0,0,0.4));overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
  .ai__head{display:flex;align-items:center;gap:10px;}
  .ai__icon{width:32px;height:32px;border-radius:10px;background:var(--bx-grad-cta);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(226,18,36,0.5);}
  .ai__icon svg{width:16px;height:16px;color:#fff;}
  .ai__suggest{padding:14px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);font-size:13px;color:rgba(255,255,255,0.85);line-height:1.55;}
  .ai__suggest strong{color:var(--bx-red);font-weight:700;}
  .ai__chat{display:flex;gap:8px;padding:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;align-items:center;}
  .ai__chat input{background:none;border:none;outline:none;color:#fff;flex:1;font-size:13px;}
  .ai__send{width:30px;height:30px;border-radius:8px;background:var(--bx-red);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;}
  .ai__send svg{width:14px;height:14px;}
  .ai__msg{padding:12px 14px;border-radius:12px;font-size:13px;line-height:1.5;animation:tfade .3s forwards;}
  .ai__msg--user{background:rgba(255,255,255,0.06);color:#fff;align-self:flex-end;max-width:85%;}
  .ai__msg--ai{background:linear-gradient(145deg,rgba(226,18,36,0.1),rgba(226,18,36,0.02));border:1px solid rgba(226,18,36,0.2);color:rgba(255,255,255,0.9);}
  .ai__toast{position:fixed;bottom:32px;right:32px;padding:14px 18px;border-radius:12px;background:linear-gradient(145deg,#22c55e,#16a34a);color:#fff;font-weight:700;font-size:13px;box-shadow:0 10px 40px rgba(34,197,94,0.3);z-index:9999;animation:tfade .3s;}

  /* Format cards */
  .fmt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  .fmt{padding:20px;border-radius:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:all .3s cubic-bezier(0.16,1,0.3,1);position:relative;}
  .fmt:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);}
  .fmt.selected{border-color:var(--bx-red);background:linear-gradient(145deg,rgba(226,18,36,0.15),rgba(226,18,36,0.02));}
  .fmt.selected::after{content:"✓";position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:999px;background:var(--bx-red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
  .fmt__sport-row{display:flex;gap:6px;margin-bottom:10px;}
  .fmt h4{font-family:var(--bx-font-display);font-size:18px;letter-spacing:-0.02em;color:#fff;margin:0 0 4px;}
  .fmt p{font-size:12px;color:rgba(255,255,255,0.55);margin:0;line-height:1.5;}

  .sport-pick{display:flex;gap:8px;flex-wrap:wrap;}
  .sport-pick button{padding:10px 16px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;}
  .sport-pick button.active{background:var(--bx-red);color:#fff;border-color:var(--bx-red);}

  /* Teams */
  .teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
  .teams-col h4{font-family:var(--bx-font-display);font-size:14px;color:#fff;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
  .teams-col h4 .count{font-family:var(--bx-font-mono);font-size:11px;color:rgba(255,255,255,0.4);font-weight:600;}
  .team-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);margin-bottom:6px;cursor:pointer;transition:all .2s;}
  .team-row:hover{background:rgba(255,255,255,0.06);}
  .team-row.added{background:rgba(226,18,36,0.08);border-color:rgba(226,18,36,0.3);}
  .team-row__crest{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0;font-family:var(--bx-font-mono);}
  .team-row__name{font-weight:600;font-size:13px;color:#fff;flex:1;}
  .team-row__sub{font-size:11px;color:rgba(255,255,255,0.4);}
  .team-row__act{width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.7);}
  .team-row__act svg{width:12px;height:12px;}
  .team-row.added .team-row__act{background:var(--bx-red);color:#fff;}

  /* Schedule (wiz step) */
  .sched-form{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .sched-form .full{grid-column:span 2;}
  .court-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .court-chip{padding:8px 14px;border-radius:999px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);font-family:var(--bx-font-mono);font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .court-chip svg{width:12px;height:12px;cursor:pointer;color:rgba(255,255,255,0.4);}

  .wnd-presets{display:flex;flex-direction:column;gap:8px;}
  .wnd-preset{padding:14px 16px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;}
  .wnd-preset.selected{background:linear-gradient(145deg,rgba(226,18,36,0.12),rgba(226,18,36,0.02));border-color:rgba(226,18,36,0.4);}
  .wnd-preset__radio{width:18px;height:18px;border-radius:999px;border:2px solid rgba(255,255,255,0.2);position:relative;flex-shrink:0;}
  .wnd-preset.selected .wnd-preset__radio{border-color:var(--bx-red);}
  .wnd-preset.selected .wnd-preset__radio::after{content:"";position:absolute;inset:3px;border-radius:999px;background:var(--bx-red);}

  /* Review */
  .rev{display:grid;grid-template-columns:1.2fr 1fr;gap:24px;}
  .rev__card{padding:24px;border-radius:16px;background:linear-gradient(145deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.08);}
  .rev__row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed rgba(255,255,255,0.06);font-size:13px;}
  .rev__row:last-child{border-bottom:none;}
  .rev__row .k{color:rgba(255,255,255,0.5);font-weight:500;}
  .rev__row .v{color:#fff;font-weight:600;}

  /* BRACKET CANVAS — fixed layout (no overlap) */
  .brk{display:grid;grid-template-columns:280px 1fr 320px;height:100%;}
  .brk__teams{padding:24px;border-right:1px solid rgba(255,255,255,0.06);overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
  .brk__teams h4{font-family:var(--bx-font-display);font-size:14px;color:#fff;margin:0 0 14px;display:flex;justify-content:space-between;align-items:center;}
  .brk__teams h4 span{font-family:var(--bx-font-mono);font-size:10px;color:rgba(255,255,255,0.4);font-weight:600;}
  .brk__seed{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);cursor:grab;transition:all .2s;}
  .brk__seed:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.15);}
  .brk__seed.dragging{opacity:0.4;}
  .brk__seed.placed{opacity:0.4;cursor:not-allowed;}
  .brk__seed-num{font-family:var(--bx-font-mono);font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);width:18px;}
  .brk__seed-crest{width:26px;height:26px;border-radius:6px;font-family:var(--bx-font-mono);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
  .brk__seed-name{font-size:12px;font-weight:600;flex:1;}
  .brk__seed-grip{color:rgba(255,255,255,0.3);}
  .brk__seed-grip svg{width:12px;height:12px;}

  .brk__canvas{position:relative;overflow:auto;padding:32px;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,0.06) 1px,transparent 0);background-size:24px 24px;}
  /* SVG bracket — sized so connectors live BETWEEN columns, no overlap */
  .brk__svg{display:block;}
  .brk__match{cursor:pointer;}
  .brk__match-bg{fill:rgba(20,20,22,0.95);stroke:rgba(255,255,255,0.1);stroke-width:1;}
  .brk__match.selected .brk__match-bg{stroke:var(--bx-red);stroke-width:2;filter:drop-shadow(0 0 8px rgba(226,18,36,0.4));}
  .brk__match-num{fill:rgba(255,255,255,0.4);font-family:ui-monospace,monospace;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;}
  .brk__match-divider{stroke:rgba(255,255,255,0.06);stroke-width:1;}
  .brk__slot{cursor:pointer;}
  .brk__slot rect{fill:transparent;}
  .brk__slot.drop-target rect{fill:rgba(226,18,36,0.2);stroke:var(--bx-red);stroke-dasharray:4 3;stroke-width:1;}
  .brk__slot.winner rect{fill:rgba(34,197,94,0.06);}
  .brk__slot-seed{fill:rgba(255,255,255,0.4);font-family:ui-monospace,monospace;font-size:10px;font-weight:700;}
  .brk__slot-name{fill:#fff;font-family:var(--bx-font-product);font-size:12px;font-weight:600;}
  .brk__slot-name.tbd{fill:rgba(255,255,255,0.3);font-style:italic;}
  .brk__slot.winner .brk__slot-name{fill:#22c55e;}
  .brk__slot-score{fill:rgba(255,255,255,0.7);font-family:ui-monospace,monospace;font-size:13px;font-weight:700;}
  .brk__slot.winner .brk__slot-score{fill:#22c55e;}
  .brk__round-label{fill:rgba(255,255,255,0.4);font-family:ui-monospace,monospace;font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;}
  .brk__connector{stroke:rgba(255,255,255,0.18);stroke-width:1.5;fill:none;}

  .brk__inspect{padding:24px;border-left:1px solid rgba(255,255,255,0.06);overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
  .brk__inspect-team{display:flex;justify-content:space-between;align-items:center;padding:8px 0;}
  .brk__inspect-team-l{display:flex;gap:8px;align-items:center;}

  /* SCHEDULE */
  .sch{padding:24px;height:100%;display:flex;flex-direction:column;gap:18px;}
  .sch__head{display:flex;justify-content:space-between;align-items:center;}
  .sch__grid{flex:1;overflow:auto;border:1px solid rgba(255,255,255,0.08);border-radius:14px;background:rgba(0,0,0,0.4);}
  .sch__table{display:grid;min-width:900px;}
  .sch__table-head{display:grid;position:sticky;top:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:2;}
  .sch__col-h{padding:14px;font-family:var(--bx-font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.6);border-right:1px solid rgba(255,255,255,0.08);border-bottom:1px solid rgba(255,255,255,0.1);font-weight:700;}
  .sch__row{display:grid;border-bottom:1px solid rgba(255,255,255,0.04);}
  .sch__time{padding:14px;font-family:var(--bx-font-mono);font-size:12px;font-weight:700;color:rgba(255,255,255,0.6);border-right:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);display:flex;align-items:center;}
  .sch__cell{padding:6px;border-right:1px solid rgba(255,255,255,0.04);min-height:64px;}
  .sch__cell.drop-target{background:rgba(226,18,36,0.1);border:1px dashed var(--bx-red);}
  .sch__match{padding:8px 10px;border-radius:8px;background:linear-gradient(145deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.1);height:100%;display:flex;flex-direction:column;justify-content:space-between;cursor:grab;font-size:11px;}
  .sch__match.knockout{border-color:rgba(226,18,36,0.4);background:linear-gradient(145deg,rgba(226,18,36,0.15),rgba(226,18,36,0.04));}
  .sch__match.live{border-color:rgba(34,197,94,0.6);background:linear-gradient(145deg,rgba(34,197,94,0.18),rgba(34,197,94,0.04));}
  .sch__match-tag{font-family:var(--bx-font-mono);font-size:9px;letter-spacing:0.1em;color:rgba(255,255,255,0.5);font-weight:700;text-transform:uppercase;}
  .sch__match-teams{font-weight:700;font-size:12px;line-height:1.2;}

  /* DETAIL */
  .det{display:grid;grid-template-columns:2fr 1fr;gap:20px;}
  .det__hero{grid-column:span 2;border-radius:18px;background:linear-gradient(135deg,rgba(226,18,36,0.18),rgba(0,0,0,0.6));border:1px solid rgba(226,18,36,0.4);padding:28px;position:relative;overflow:hidden;}
  .det__hero::before{content:"";position:absolute;right:-100px;top:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(226,18,36,0.4),transparent 60%);filter:blur(40px);pointer-events:none;}
  .det__hero-row{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;position:relative;z-index:1;}
  .det__hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:24px;position:relative;z-index:1;}
  .det__stat{display:flex;flex-direction:column;gap:6px;}
  .det__stat-num{font-family:var(--bx-font-display);font-size:32px;letter-spacing:-0.02em;line-height:1;color:#fff;}
  .det__stat-num em{font-style:normal;color:var(--bx-red);font-size:18px;}
  .det__stat-lbl{font-family:var(--bx-font-mono);font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.5);}
  .det__game{padding:14px;border-radius:12px;background:linear-gradient(145deg,rgba(34,197,94,0.1),rgba(0,0,0,0.4));border:1px solid rgba(34,197,94,0.3);}
  .det__game-meta{font-family:var(--bx-font-mono);font-size:10px;letter-spacing:0.14em;color:#22c55e;text-transform:uppercase;display:flex;align-items:center;gap:6px;font-weight:700;}
  .det__game-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
  .det__game-team{font-weight:700;font-size:14px;}
  .det__game-score{font-family:var(--bx-font-display);font-size:20px;letter-spacing:-0.02em;}

  .lader{display:flex;flex-direction:column;}
  .lader__row{display:grid;grid-template-columns:24px 32px 1fr repeat(4,40px);gap:10px;align-items:center;padding:10px 4px;border-bottom:1px solid rgba(255,255,255,0.04);font-family:var(--bx-font-mono);}
  .lader__row.head{font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:0.14em;text-transform:uppercase;font-weight:700;}
  .lader__row.first .lader__rank{color:#fbbf24;}
  .lader__rank{font-size:13px;font-weight:700;}
  .lader__name{font-size:13px;color:#fff;font-weight:700;font-family:var(--bx-font-product);}
  .lader__num{font-size:13px;text-align:right;color:rgba(255,255,255,0.8);}
  .lader__num.gd-pos{color:#22c55e;}
  .lader__num.gd-neg{color:#ef4444;}

  .topscore{display:flex;flex-direction:column;gap:8px;}
  .topscore__row{display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;background:rgba(255,255,255,0.03);}

function renderAIFeed(){
  const feed = document.getElementById('ai-feed');
  if(!feed) return;
  const hints = AI_HINTS[wizState.step] || [];
  feed.innerHTML = hints.map(h=>`
    <div class="ai__msg ai__msg--ai">
      <div>${h.t}</div>
      ${h.cta?`<button class="t-btn t-btn--sm t-btn--primary" style="margin-top:8px;padding:5px 11px;font-size:10px;" data-ai-cta="${h.cta}">${h.cta}</button>`:''}
    </div>
  `).join('');
  feed.querySelectorAll('[data-ai-cta]').forEach(b=>{
    b.addEventListener('click', ()=> showToast(`✓ ${b.dataset.aiCta} applied`));
  });
}

function showToast(msg){
  const t = document.createElement('div');
  t.className = 'ai__toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(), 300); }, 1800);
}

function bindWizard(){
  if(!host.querySelector('.wiz')) return;
  wizState.step = 1;
  renderWizPanel();
  renderAIFeed();

  document.querySelectorAll('.wiz__step').forEach(el=>{
    el.addEventListener('click', ()=>{
      wizState.step = parseInt(el.dataset.step);
      renderWizPanel();
      renderAIFeed();
    });
  });

  // AI chat
  const send = ()=>{
    const inp = document.getElementById('ai-input');
    if(!inp||!inp.value.trim()) return;
    const feed = document.getElementById('ai-feed');
    const userMsg = document.createElement('div');
    userMsg.className='ai__msg ai__msg--user';
    userMsg.textContent = inp.value;
    feed.appendChild(userMsg);
    const aiMsg = document.createElement('div');
    aiMsg.className='ai__msg ai__msg--ai';
    aiMsg.innerHTML = `Got it — adjusting based on "<em>${inp.value}</em>". One moment…`;
    feed.appendChild(aiMsg);
    feed.scrollTop = feed.scrollHeight;
    inp.value='';
  };
  document.getElementById('ai-send')?.addEventListener('click', send);
  document.getElementById('ai-input')?.addEventListener('keydown', e=>{ if(e.key==='Enter') send(); });

  document.getElementById('wiz-save-draft')?.addEventListener('click', ()=> showToast('✓ Draft saved'));
}

function bindWizPanelInteractions(){
  // Back / Next / Publish
  document.getElementById('wiz-back')?.addEventListener('click', ()=>{
    if(wizState.step>1){ wizState.step--; renderWizPanel(); renderAIFeed(); }
  });
  document.getElementById('wiz-next')?.addEventListener('click', ()=>{
    if(wizState.step<4){ wizState.step++; renderWizPanel(); renderAIFeed(); }
  });
  document.getElementById('wiz-publish')?.addEventListener('click', ()=>{
    showToast('✓ Tournament published — 7 events created, 147 invites sent');
    setTimeout(()=> navigate('detail'), 800);
  });

  // Step 1: format pick + sport pick
  document.querySelectorAll('.fmt').forEach(el=>{
    el.addEventListener('click', ()=>{
      wizState.format = el.dataset.fmt;
      document.querySelectorAll('.fmt').forEach(o=>o.classList.remove('selected'));
      el.classList.add('selected');
    });
  });
  document.querySelectorAll('[data-sport]').forEach(el=>{
    el.addEventListener('click', ()=>{
      wizState.sport = el.dataset.sport;
      document.querySelectorAll('[data-sport]').forEach(o=>o.classList.remove('active'));
      el.classList.add('active');
    });
  });

  // Step 2: team toggle
  document.querySelectorAll('.team-row').forEach(el=>{
    el.addEventListener('click', ()=>{
      const i = parseInt(el.dataset.teamIdx);
      if(wizState.teams.has(i)) wizState.teams.delete(i);
      else wizState.teams.add(i);
      renderWizPanel();
    });
  });

  // Step 3: window preset
  document.querySelectorAll('.wnd-preset').forEach(el=>{
    el.addEventListener('click', ()=>{
      wizState.windowPreset = el.dataset.preset;
      document.querySelectorAll('.wnd-preset').forEach(o=>o.classList.remove('selected'));
      el.classList.add('selected');
    });
  });
}

/* ============================================================
   BRACKET CANVAS — SVG-based, no overlap
   ============================================================ */
const BRK_LAYOUT = {
  matchW: 240, matchH: 64,    // box width / height
  colGap: 80,                  // horizontal gap between rounds
  vSpace: 22,                  // vertical gap between QF matches
  padTop: 40, padLeft: 40,
};

function bracketSVG(){
  const L = BRK_LAYOUT;
  const cols = 3;
  // QF (col 0): 4 matches stacked
  // SF (col 1): 2 matches, vertically aligned to mid-point of pairs
  // F  (col 2): 1 match, vertical mid of SFs
  function pos(m){
    const colX = L.padLeft + m.x*(L.matchW + L.colGap);
    const rowsInCol = m.x===0?4: m.x===1?2:1;
    const baseSpacing = (L.matchH + L.vSpace);
    const colHeight = 4*baseSpacing; // QF column total
    let topY;
    if(m.x===0){ topY = L.padTop + m.y*baseSpacing; }
    else if(m.x===1){
      // each SF spans 2 QFs
      const mid = L.padTop + (m.y*2*baseSpacing) + (baseSpacing - L.matchH/2);
      topY = mid - L.matchH/2;
    } else { // F
      const midOfSFs = L.padTop + 2*baseSpacing - L.matchH/2;
      topY = midOfSFs;
    }
    return {x:colX, y:topY};
  }

  const W = L.padLeft*2 + cols*L.matchW + (cols-1)*L.colGap;
  const H = L.padTop*2 + 4*(L.matchH + L.vSpace);

  // Round labels
  const labels = [
    {x: L.padLeft + L.matchW/2, label:'Quarterfinals'},
    {x: L.padLeft + L.matchW + L.colGap + L.matchW/2, label:'Semifinals'},
    {x: L.padLeft + 2*(L.matchW + L.colGap) + L.matchW/2, label:'Final'},
  ];

  // Build connectors (parent → child)
  const connectors = [];
  // QF1+QF2 → SF1
  // QF3+QF4 → SF2
  // SF1+SF2 → F
  function connect(parentId, childId){
    const p = pos(BRACKET.matches[parentId-1]);
    const c = pos(BRACKET.matches[childId-1]);
    const x1 = p.x + L.matchW;
    const y1 = p.y + L.matchH/2;
    const x2 = c.x;
    const y2 = c.y + L.matchH/2;
    const xm = x1 + L.colGap/2;
    return `<path class="brk__connector" d="M ${x1} ${y1} L ${xm} ${y1} L ${xm} ${y2} L ${x2} ${y2}" />`;
  }
  connectors.push(connect(1,5), connect(2,5), connect(3,6), connect(4,6), connect(5,7), connect(6,7));

  function slot(match, side){
    const slotData = side==='top' ? match.top : match.bot;
    const p = pos(match);
    const sy = side==='top' ? p.y : p.y + L.matchH/2;
    const isWinner = match.winner===side;
    const score = side==='top' ? match.topScore : match.botScore;

    if(slotData){
      return `
        <g class="brk__slot ${isWinner?'winner':''}" data-match="${match.id}" data-side="${side}">
          <rect x="${p.x}" y="${sy}" width="${L.matchW}" height="${L.matchH/2}" />
          <text class="brk__slot-seed" x="${p.x+10}" y="${sy + L.matchH/4 + 4}">${slotData.seed}</text>
          <rect x="${p.x+24}" y="${sy + L.matchH/4 - 11}" width="22" height="22" rx="4" fill="${slotData.t.c}" />
          <text x="${p.x+35}" y="${sy + L.matchH/4 + 4}" fill="#fff" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" font-weight="700">${slotData.t.a}</text>
          <text class="brk__slot-name" x="${p.x+54}" y="${sy + L.matchH/4 + 4}">${slotData.t.n.replace(' U14','').replace(' U16','')}</text>
          ${score!=null?`<text class="brk__slot-score" x="${p.x+L.matchW-12}" y="${sy + L.matchH/4 + 5}" text-anchor="end">${score}</text>`:''}
        </g>
      `;
    }
    return `
      <g class="brk__slot" data-match="${match.id}" data-side="${side}">
        <rect x="${p.x}" y="${sy}" width="${L.matchW}" height="${L.matchH/2}" />
        <text class="brk__slot-name tbd" x="${p.x+12}" y="${sy + L.matchH/4 + 4}">Awaiting winner</text>
      </g>
    `;
  }

  return `
    <svg class="brk__svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
      ${connectors.join('')}
      ${labels.map(l=>`<text class="brk__round-label" x="${l.x}" y="20" text-anchor="middle">${l.label}</text>`).join('')}
      ${BRACKET.matches.map(m=>{
        const p = pos(m);
        const sel = m.id===selectedMatchId ? 'selected' : '';
        return `
          <g class="brk__match ${sel}" data-match="${m.id}">
            <rect class="brk__match-bg" x="${p.x}" y="${p.y}" width="${L.matchW}" height="${L.matchH}" rx="8" />
            <line class="brk__match-divider" x1="${p.x+8}" y1="${p.y + L.matchH/2}" x2="${p.x + L.matchW - 8}" y2="${p.y + L.matchH/2}" />
            <text class="brk__match-num" x="${p.x+10}" y="${p.y - 6}">${m.label}${m.live?' · LIVE':''}</text>
            ${slot(m,'top')}
            ${slot(m,'bot')}
          </g>
        `;
      }).join('')}
    </svg>
  `;
}

function bindBracket(){
  if(!host.querySelector('.brk')) return;

  let dragTeamIdx = null;

  // Seed drag
  host.querySelectorAll('.brk__seed[draggable="true"]').forEach(el=>{
    el.addEventListener('dragstart', e=>{
      dragTeamIdx = parseInt(el.dataset.teamIdx);
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      // Custom drag image with crest
      const ghost = el.cloneNode(true);
      ghost.style.position='absolute'; ghost.style.top='-9999px';
      ghost.style.background='rgba(20,20,22,0.95)'; ghost.style.padding='10px';
      ghost.style.borderRadius='8px';
      document.body.appendChild(ghost);
      e.dataTransfer.setDragImage(ghost, 20, 20);
      setTimeout(()=>ghost.remove(), 0);
    });
    el.addEventListener('dragend', ()=>{ el.classList.remove('dragging'); dragTeamIdx=null; });
  });

  // SVG slot drop
  host.querySelectorAll('.brk__slot').forEach(slot=>{
    slot.addEventListener('dragover', e=>{ e.preventDefault(); slot.classList.add('drop-target'); });
    slot.addEventListener('dragleave', ()=> slot.classList.remove('drop-target'));
    slot.addEventListener('drop', e=>{
      e.preventDefault(); slot.classList.remove('drop-target');
      if(dragTeamIdx==null) return;
      const matchId = parseInt(slot.dataset.match);
      const side = slot.dataset.side;
      const match = BRACKET.matches.find(m=>m.id===matchId);
      const t = TEAMS[dragTeamIdx];
      // Find seed number from index
      const seed = dragTeamIdx + 1;
      match[side] = {seed, t};
      placedTeams.add(dragTeamIdx);
      // Re-render bracket
      document.getElementById('brk-canvas').innerHTML = bracketSVG();
      // Re-render seeds list (mark placed)
      const teamsAside = document.getElementById('brk-teams');
      host.querySelectorAll('.brk__seed').forEach(s=>{
        const i = parseInt(s.dataset.teamIdx);
        if(placedTeams.has(i)){ s.classList.add('placed'); s.draggable=false; }
      });
      bindBracketCanvas();
      showToast(`✓ ${t.n} placed in ${match.label}`);
    });
  });

  bindBracketCanvas();

  // AI re-seed
  document.getElementById('brk-reseed')?.addEventListener('click', ()=> showToast('✓ Re-seeded — same-org QF rematches avoided'));
}

function bindBracketCanvas(){

    g.addEventListener('click', e=>{

      const id = parseInt(g.dataset.match);
      selectedMatchId = id;
      document.getElementById('brk-canvas').innerHTML = bracketSVG();
      document.getElementById('brk-inspect').innerHTML = renderInspector();

}

function bindSchedule(){
  if(!host.querySelector('.sch')) return;
  let dragMatch = null;
  host.querySelectorAll('.sch__match').forEach(el=>{
    el.addEventListener('dragstart', e=>{
      dragMatch = el; el.style.opacity='0.4';
      e.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend', ()=>{ el.style.opacity='1'; dragMatch=null; });
  });
  host.querySelectorAll('.sch__cell').forEach(c=>{
    c.addEventListener('dragover', e=>{ e.preventDefault(); c.classList.add('drop-target'); });
    c.addEventListener('dragleave', ()=> c.classList.remove('drop-target'));
    c.addEventListener('drop', e=>{
      e.preventDefault(); c.classList.remove('drop-target');
      if(dragMatch && c.children.length===0){ c.appendChild(dragMatch); showToast('✓ Match moved'); }
    });
  });
  document.getElementById('sch-autopack')?.addEventListener('click', ()=> showToast('✓ Auto-packed — 7 matches across 3 courts, no conflicts'));
}

      host.querySelectorAll('.pv-tab').forEach(o=>o.classList.remove('active'));
      host.querySelectorAll('.pv-tabbody').forEach(o=>o.classList.remove('active'));
      tab.classList.add('active');
      host.querySelector(`.pv-tabbody[data-pv-pane="${tab.dataset.pv}"]`).classList.add('active');
    });
  });
  document.getElementById('pv-checkin')?.addEventListener('click', ()=> showToast('✓ Checked in to QF · Riverside vs Hawks'));
}

/* INIT */
document.querySelectorAll('.t-sb__item[data-nav="hub"]').forEach(el=>{
  el.addEventListener('click', e=>{ e.preventDefault(); navigate('hub'); });
});
const initial = (location.hash||'#hub').slice(1);
navigate(initial in screens ? initial : 'hub');
</script>
</body>
